<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>🎞 Tape Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0c0c10;--s1:#14141c;--s2:#1c1c28;--s3:#242434;--bdr:#2e2e42;
  --acc:#f5c842;--acc2:#ff6b35;--grn:#3ddc84;--blu:#5b9cf6;
  --pur:#c084fc;--red:#f87171;--tel:#22d3ee;
  --txt:#e2e2f0;--mut:#6b6b8a;
  --ff:'Syne',sans-serif;--fm:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--ff);min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--bdr) 1px,transparent 1px),linear-gradient(90deg,var(--bdr) 1px,transparent 1px);background-size:40px 40px;opacity:.12;pointer-events:none;z-index:0}

/* ── NAV TABS ── */
.nav{position:sticky;top:0;z-index:50;background:var(--s1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:0;overflow-x:auto;padding:0 16px}
.nav-brand{font-size:15px;font-weight:800;padding:0 14px 0 0;border-right:1px solid var(--bdr);margin-right:4px;white-space:nowrap;color:var(--acc);flex-shrink:0}
.nav-brand span{color:var(--txt)}
.tab{padding:16px 18px;font-family:var(--fm);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;flex-shrink:0;border:none;background:none}
.tab:hover{color:var(--txt)}
.tab.active{color:var(--acc);border-bottom:2px solid var(--acc)}
.sync-btn{margin-left:auto;flex-shrink:0;padding:7px 14px;background:var(--s3);border:1px solid var(--bdr);border-radius:6px;color:var(--mut);font-family:var(--fm);font-size:9px;letter-spacing:1px;cursor:pointer;transition:all .2s;white-space:nowrap}
.sync-btn:hover{color:var(--txt);border-color:var(--acc)}
.sync-btn.spinning{color:var(--acc);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── PAGES ── */
.page{display:none;position:relative;z-index:1;max-width:900px;margin:0 auto;padding:20px 16px 80px}
.page.active{display:block}

/* ── STATUS BAR ── */
.status-bar{font-family:var(--fm);font-size:10px;padding:8px 14px;border-radius:8px;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.status-bar.ok{background:rgba(61,220,132,.08);color:var(--grn);border:1px solid rgba(61,220,132,.2)}
.status-bar.err{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.status-bar.loading{background:rgba(245,200,66,.08);color:var(--acc);border:1px solid rgba(245,200,66,.2)}
.sdot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.sdot.spin{animation:pulse 1s infinite}

/* ── SEARCH PAGE ── */
.search-hero{text-align:center;padding:24px 0 20px}
.search-hero h1{font-size:clamp(24px,5vw,36px);font-weight:800;margin-bottom:6px}
.search-hero h1 span{color:var(--acc)}
.search-hero p{font-family:var(--fm);font-size:11px;color:var(--mut)}
.search-box{position:relative;margin:20px 0 8px}
.search-box input{
  width:100%;padding:16px 50px 16px 20px;
  background:var(--s1);border:1.5px solid var(--bdr);
  border-radius:12px;color:var(--txt);
  font-family:var(--ff);font-size:16px;outline:none;
  transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;
}
.search-box input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(245,200,66,.12)}
.search-box input::placeholder{color:var(--mut)}
.search-icon{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:20px;pointer-events:none}
.search-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--bdr);background:var(--s2);color:var(--mut);font-family:var(--fm);font-size:10px;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.filter-btn:hover,.filter-btn.active{background:var(--acc);color:#000;border-color:var(--acc);font-weight:700}
.search-count{font-family:var(--fm);font-size:10px;color:var(--mut);margin-bottom:12px}
.search-count b{color:var(--acc)}

/* ── TAPE CARD ── */
.tape-card{
  background:var(--s1);border:1px solid var(--bdr);
  border-radius:12px;padding:16px;margin-bottom:10px;
  display:flex;align-items:flex-start;gap:14px;
  transition:border-color .2s,transform .15s;
  cursor:default;
}
.tape-card:hover{border-color:var(--acc);transform:translateX(3px)}
.tape-num{font-family:var(--fm);font-size:11px;color:var(--mut);flex-shrink:0;padding-top:2px;min-width:28px}
.tape-body{flex:1;min-width:0}
.tape-artist{font-size:15px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tape-album{font-size:13px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}
.tape-tags{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tag{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:10px;font-family:var(--fm);font-size:9px;font-weight:700;letter-spacing:.5px}
.tag-genre{background:rgba(91,156,246,.12);color:var(--blu)}
.tag-dig{background:rgba(61,220,132,.12);color:var(--grn)}
.tag-nodig{background:rgba(107,107,138,.1);color:var(--mut)}
.tag-yt{background:rgba(255,68,68,.1);color:#ff4444}
.tag-ig{background:rgba(192,132,252,.1);color:var(--pur)}
.tag-wa{background:rgba(34,211,238,.1);color:var(--tel)}
.tape-ref{font-family:var(--fm);font-size:10px;color:var(--mut);flex-shrink:0;padding-top:2px}

/* highlight match */
mark{background:rgba(245,200,66,.25);color:var(--acc);border-radius:2px;padding:0 1px}

/* no results */
.no-results{text-align:center;padding:60px 20px;color:var(--mut)}
.no-results .icon{font-size:48px;margin-bottom:12px;opacity:.3}
.no-results p{font-family:var(--fm);font-size:12px;line-height:1.7}

/* ── DASHBOARD PAGE ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:24px}
.kpi{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:16px 14px 12px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--kc,var(--acc))}
.kpi-lbl{font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--mut);text-transform:uppercase;margin-bottom:6px}
.kpi-val{font-size:32px;font-weight:800;color:var(--kc,var(--acc));line-height:1}
.kpi-sub{font-size:11px;color:var(--mut);margin-top:4px}
.sec-title{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--mut);margin:24px 0 12px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--bdr)}
.prog-card{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:20px;margin-bottom:20px}
.prog-big{font-size:56px;font-weight:800;color:var(--grn);line-height:1;margin-bottom:12px}
.prog-track{background:var(--bdr);border-radius:6px;height:10px;overflow:hidden;margin-bottom:12px}
.prog-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--grn),var(--tel));width:0%;transition:width 1.4s cubic-bezier(.4,0,.2,1)}
.prog-meta{display:flex;gap:16px;flex-wrap:wrap}
.pm{display:flex;flex-direction:column;gap:1px}
.pm-v{font-size:20px;font-weight:800}
.pm-l{font-family:var(--fm);font-size:9px;color:var(--mut);letter-spacing:1px;text-transform:uppercase}
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:18px;margin-bottom:14px}
.card-title{font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--mut);text-transform:uppercase;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.bar-name{font-size:12px;font-weight:600;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;background:var(--bdr);border-radius:4px;height:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;width:0%;transition:width 1s cubic-bezier(.4,0,.2,1)}
.bar-num{font-family:var(--fm);font-size:10px;color:var(--mut);flex-shrink:0;width:28px;text-align:right}
.donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.donut-leg{flex:1;min-width:110px}
.leg-row{display:flex;align-items:center;gap:7px;margin-bottom:8px;font-size:12px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-val{font-family:var(--fm);font-size:10px;color:var(--mut);margin-left:auto}

/* ── LOADING OVERLAY ── */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:14px}
.spinner{width:44px;height:44px;border-radius:50%;border:3px solid var(--bdr);border-top-color:var(--acc);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader p{font-family:var(--fm);font-size:11px;color:var(--mut)}

/* ── MOBILE BOTTOM NAV ── */
@media(max-width:600px){
  .nav{padding:0 8px}
  .tab{padding:14px 12px;font-size:9px;letter-spacing:1px}
  .page{padding:16px 12px 100px}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-brand">🎞 <span>TAPE</span></div>
  <button class="tab active" onclick="showPage('search',this)">🔍 Search</button>
  <button class="tab" onclick="showPage('dashboard',this)">📊 Dashboard</button>
  <button class="tab" onclick="showPage('collection',this)">📋 Collection</button>
  <button class="sync-btn" id="sync-btn" onclick="loadData()">↻ Sync</button>
</nav>

<!-- ══ SEARCH PAGE ══ -->
<div class="page active" id="page-search">
  <div id="status-search" class="status-bar loading" style="display:none">
    <div class="sdot spin"></div><span id="status-search-txt">Loading…</span>
  </div>
  <div class="search-hero">
    <h1>Find a <span>Tape</span></h1>
    <p>Search your entire collection instantly</p>
  </div>
  <div class="search-box">
    <input type="search" id="q" placeholder="Artist, album, genre, label…" oninput="doSearch()" autocomplete="off" autocorrect="off" spellcheck="false"/>
    <span class="search-icon">🔍</span>
  </div>
  <div class="search-filters" id="filters"></div>
  <div class="search-count" id="search-count"></div>
  <div id="results"></div>
</div>

<!-- ══ DASHBOARD PAGE ══ -->
<div class="page" id="page-dashboard">
  <div class="kpi-grid" id="kpi-grid"></div>
  <div class="sec-title">Overall Progress</div>
  <div class="prog-card">
    <div class="prog-big" id="pct-big">—</div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    <div class="prog-meta" id="prog-meta"></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div class="card">
      <div class="card-title">Status Breakdown</div>
      <div class="donut-wrap">
        <canvas id="donut" width="110" height="110"></canvas>
        <div class="donut-leg" id="donut-leg"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Platforms</div>
      <div id="plat-bars"></div>
    </div>
  </div>
  <div class="sec-title">Top Genres</div>
  <div class="card"><div id="genre-bars"></div></div>
  <div class="sec-title">Top Labels</div>
  <div class="card"><div id="label-bars" style="display:grid;grid-template-columns:1fr 1fr;gap:4px 24px"></div></div>
</div>

<!-- ══ COLLECTION PAGE ══ -->
<div class="page" id="page-collection">
  <div class="sec-title">Full Collection <span id="col-count" style="color:var(--acc);font-size:13px"></span></div>
  <div id="col-list"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG — your Google Sheet URL is pre-loaded
// ═══════════════════════════════════════════════════════════
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ1YCCoP2M9d_QiOHHYyVLXdL_nFAxhuo3cW1c2nl8T1goEYyHtgNnVwyskR6UnowzW7mTv7K9twuy7/pub?output=csv';

const PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let ALL_TAPES = [];
let activeFilter = 'all';

// ═══════════════════════════════════════════════════════════
// CSV
// ═══════════════════════════════════════════════════════════
function parseCSV(txt) {
  const lines = txt.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = splitLine(lines[0]);
  return lines.slice(1).map(l => {
    const v = splitLine(l), o = {};
    headers.forEach((h,i) => o[h.trim()] = (v[i]||'').trim());
    return o;
  });
}
function splitLine(l) {
  const r=[]; let cur='', q=false;
  for (const c of l) {
    if (c==='"') q=!q;
    else if (c===',' && !q) { r.push(cur); cur=''; }
    else cur+=c;
  }
  r.push(cur); return r;
}

// ═══════════════════════════════════════════════════════════
// FETCH with proxy fallback
// ═══════════════════════════════════════════════════════════
async function tryFetch(url, ms=7000) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, {signal: ctrl.signal});
    clearTimeout(t);
    if (!r.ok) return null;
    const txt = await r.text();
    return txt.length > 30 ? txt : null;
  } catch(e) { clearTimeout(t); return null; }
}

async function loadData() {
  setSyncState(true);
  setStatus('loading', 'Syncing with Google Sheets…');

  let text = null;

  // direct
  text = await tryFetch(SHEET_URL, 5000);

  // proxies
  if (!text) {
    for (const px of PROXIES) {
      setStatus('loading', 'Connecting via proxy…');
      text = await tryFetch(px(SHEET_URL), 8000);
      if (text) break;
    }
  }

  setSyncState(false);

  if (!text) {
    setStatus('err', '❌ Could not sync. Check your internet connection and try again.');
    return;
  }

  try {
    let rows = parseCSV(text);
    // auto-detect header row
    if (!Object.keys(rows[0]||{}).includes('Artist')) {
      const lines = text.trim().split(/\r?\n/);
      const hi = lines.findIndex(l => /artist/i.test(l));
      if (hi >= 0) rows = parseCSV(lines.slice(hi).join('\n'));
    }
    rows = rows.filter(r => {
      const a = (r['Artist']||'').trim();
      return a && !['Artist','Artiste'].includes(a);
    });
    if (!rows.length) throw new Error('No tape rows found');

    ALL_TAPES = rows.map((r,i) => normalise(r,i));
    renderDashboard();
    renderCollection();
    doSearch();
    buildFilters();
    setStatus('ok', `✓ ${ALL_TAPES.length} tapes loaded`);
    try { localStorage.setItem('tape_cache', JSON.stringify({ts: Date.now(), data: ALL_TAPES})); } catch(e){}
  } catch(e) {
    setStatus('err', '⚠ Data error: ' + e.message);
  }
}

// ═══════════════════════════════════════════════════════════
// NORMALISE ROW
// ═══════════════════════════════════════════════════════════
function get(r, ...keys) { for (const k of keys) if (r[k] !== undefined && r[k] !== '') return r[k]; return ''; }
const isYes    = v => String(v||'').trim().toUpperCase() === 'YES';
const isPosted = v => String(v||'').trim().toLowerCase() === 'posted';
const mg = g => g ? String(g).split(/[,\/]/)[0].trim() : '';

function normalise(r, i) {
  return {
    ref:      get(r,'REF','Ref','ref') || (i+1),
    artist:   get(r,'Artist','ARTIST'),
    album:    get(r,'Album_Title','Album / Title','Album','ALBUM'),
    genre:    get(r,'Genre_Category','Genre / Category','Genre','GENRE'),
    label:    get(r,'Label_Notes','Label / Notes','Label','LABEL'),
    digitized:isYes(get(r,'Digitized','DIGITIZED')),
    cover:    isYes(get(r,'COVER_SCAN','Cover Scan','COVER SCAN')),
    youtube:  isPosted(get(r,'YOUTUBE','Youtube','YouTube')),
    instagram:isPosted(get(r,'INSTAGRAM','Instagram')),
    webarchive:isPosted(get(r,'WEBARCHIVE','WebArchive','Web Archive')),
    mainGenre:mg(get(r,'Genre_Category','Genre / Category','Genre')),
  };
}

// ═══════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════
function doSearch() {
  const q = (document.getElementById('q').value || '').toLowerCase().trim();
  let results = ALL_TAPES;

  // filter tab
  if (activeFilter === 'digitized')   results = results.filter(t => t.digitized);
  if (activeFilter === 'not_dig')     results = results.filter(t => !t.digitized);
  if (activeFilter === 'published')   results = results.filter(t => t.youtube || t.instagram || t.webarchive);
  if (activeFilter === 'not_started') results = results.filter(t => !t.digitized && !t.cover && !t.youtube && !t.instagram && !t.webarchive);

  if (q) {
    results = results.filter(t =>
      t.artist.toLowerCase().includes(q) ||
      t.album.toLowerCase().includes(q) ||
      t.genre.toLowerCase().includes(q) ||
      t.label.toLowerCase().includes(q) ||
      String(t.ref).includes(q)
    );
  }

  const count = document.getElementById('search-count');
  if (!ALL_TAPES.length) {
    count.innerHTML = '';
    document.getElementById('results').innerHTML = `<div class="loader"><div class="spinner"></div><p>Loading collection…</p></div>`;
    return;
  }

  count.innerHTML = q || activeFilter !== 'all'
    ? `<b>${results.length}</b> result${results.length!==1?'s':''} found`
    : `<b>${ALL_TAPES.length}</b> tapes in collection`;

  if (!results.length) {
    document.getElementById('results').innerHTML = `
      <div class="no-results">
        <div class="icon">🔍</div>
        <p>No tapes found for "<strong>${esc(q)}</strong>"<br>Try the artist name, album, or genre</p>
      </div>`;
    return;
  }

  document.getElementById('results').innerHTML = results.slice(0,100).map(t => tapeCard(t, q)).join('');
}

function tapeCard(t, q='') {
  const hi = s => q ? s.replace(new RegExp(`(${escReg(q)})`, 'gi'), '<mark>$1</mark>') : s;
  const tags = [
    t.digitized  ? `<span class="tag tag-dig">✓ Digitized</span>` : `<span class="tag tag-nodig">Not digitized</span>`,
    t.mainGenre  ? `<span class="tag tag-genre">${esc(t.mainGenre)}</span>` : '',
    t.youtube    ? `<span class="tag tag-yt">YT</span>` : '',
    t.instagram  ? `<span class="tag tag-ig">IG</span>` : '',
    t.webarchive ? `<span class="tag tag-wa">Archive</span>` : '',
  ].filter(Boolean).join('');
  return `
    <div class="tape-card">
      <div class="tape-num">#${t.ref}</div>
      <div class="tape-body">
        <div class="tape-artist">${hi(esc(t.artist))}</div>
        <div class="tape-album">${hi(esc(t.album || '—'))}</div>
        <div class="tape-tags">${tags}</div>
      </div>
    </div>`;
}

function buildFilters() {
  const genres = [...new Set(ALL_TAPES.map(t=>t.mainGenre).filter(Boolean))].sort().slice(0,8);
  const btns = [
    {k:'all',       l:'All'},
    {k:'digitized', l:'✓ Digitized'},
    {k:'not_dig',   l:'Not Digitized'},
    {k:'published', l:'Published'},
    {k:'not_started',l:'Not Started'},
  ];
  document.getElementById('filters').innerHTML = btns.map(b =>
    `<button class="filter-btn ${activeFilter===b.k?'active':''}" onclick="setFilter('${b.k}')">${b.l}</button>`
  ).join('') + genres.map(g =>
    `<button class="filter-btn" onclick="setGenreFilter('${esc(g)}')">${esc(g)}</button>`
  ).join('');
}

function setFilter(k) {
  activeFilter = k;
  buildFilters();
  doSearch();
}
function setGenreFilter(g) {
  document.getElementById('q').value = g;
  activeFilter = 'all';
  buildFilters();
  doSearch();
}

// ═══════════════════════════════════════════════════════════
// COLLECTION PAGE
// ═══════════════════════════════════════════════════════════
function renderCollection() {
  document.getElementById('col-count').textContent = ALL_TAPES.length + ' tapes';
  document.getElementById('col-list').innerHTML = ALL_TAPES.map(t => tapeCard(t)).join('');
}

// ═══════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════
const COLS=['#5b9cf6','#3ddc84','#f5c842','#c084fc','#22d3ee','#f87171','#fb923c','#a3e635','#818cf8','#34d399','#fbbf24','#f472b6'];

function renderDashboard() {
  const T = ALL_TAPES;
  const total = T.length;
  const dig = T.filter(t=>t.digitized).length;
  const cov = T.filter(t=>t.cover).length;
  const yt  = T.filter(t=>t.youtube).length;
  const ig  = T.filter(t=>t.instagram).length;
  const wa  = T.filter(t=>t.webarchive).length;
  const ns  = T.filter(t=>!t.digitized&&!t.cover&&!t.youtube&&!t.instagram&&!t.webarchive).length;
  const pct = total ? Math.round(dig/total*100) : 0;

  // KPIs
  document.getElementById('kpi-grid').innerHTML = [
    {l:'Total Tapes',  v:total,   s:'in collection',             c:'var(--acc)'},
    {l:'Digitized',    v:dig,     s:`${pct}% done`,              c:'var(--grn)'},
    {l:'Cover Scanned',v:cov,     s:`${p_(cov,total)}%`,         c:'var(--blu)'},
    {l:'Not Started',  v:ns,      s:`${p_(ns,total)}% remain`,   c:'var(--red)'},
    {l:'YouTube',      v:yt,      s:'published',                 c:'#ff4444'},
    {l:'Instagram',    v:ig,      s:'published',                 c:'var(--pur)'},
    {l:'WebArchive',   v:wa,      s:'archived',                  c:'var(--tel)'},
    {l:'Published',    v:yt+ig+wa,s:'total across platforms',    c:'var(--acc2)'},
  ].map(k=>`<div class="kpi" style="--kc:${k.c}"><div class="kpi-lbl">${k.l}</div><div class="kpi-val">${k.v}</div><div class="kpi-sub">${k.s}</div></div>`).join('');

  // Progress
  document.getElementById('pct-big').textContent = pct+'%';
  setTimeout(()=>{ document.getElementById('prog-fill').style.width=pct+'%'; },150);
  document.getElementById('prog-meta').innerHTML=[
    {v:dig,l:'Digitized',c:'var(--grn)'},{v:cov,l:'Cover Scan',c:'var(--blu)'},
    {v:ns,l:'Not Started',c:'var(--red)'},{v:yt+ig+wa,l:'Published',c:'var(--pur)'},
  ].map(s=>`<div class="pm"><span class="pm-v" style="color:${s.c}">${s.v}</span><span class="pm-l">${s.l}</span></div>`).join('');

  // Donut
  const segs=[{l:'Digitized',v:dig,c:'#3ddc84'},{l:'Cover Only',v:Math.max(0,cov-dig),c:'#5b9cf6'},{l:'In Progress',v:Math.max(0,total-dig-ns),c:'#f5c842'},{l:'Not Started',v:ns,c:'#f87171'}].filter(s=>s.v>0);
  drawDonut(segs,total,pct);

  // Platforms
  document.getElementById('plat-bars').innerHTML=[
    {n:'YouTube',v:yt,c:'#ff4444'},{n:'Instagram',v:ig,c:'#c084fc'},{n:'WebArchive',v:wa,c:'#22d3ee'},
  ].map(p=>bRow(p.n,p.v,total,p.c,80)).join('');

  // Genres
  const gmap={};
  T.forEach(t=>{ const g=t.mainGenre||'Unknown'; gmap[g]=(gmap[g]||0)+1; });
  const genres=Object.entries(gmap).sort((a,b)=>b[1]-a[1]).slice(0,12);
  const gmax=genres[0]?.[1]||1;
  document.getElementById('genre-bars').innerHTML=genres.map(([g,c],i)=>bRow(g,c,gmax,COLS[i%COLS.length],100)).join('');

  // Labels
  const lmap={};
  T.forEach(t=>{ const l=(t.label||'').trim(); if(l&&l!=='undefined') lmap[l]=(lmap[l]||0)+1; });
  const labels=Object.entries(lmap).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const lmax=labels[0]?.[1]||1;
  document.getElementById('label-bars').innerHTML=labels.map(([l,c],i)=>bRow(l,c,lmax,COLS[i%COLS.length],110)).join('');

  setTimeout(()=>{ document.querySelectorAll('.bar-fill').forEach(b=>{ b.style.width=b.dataset.p+'%'; }); },200);
}

function bRow(name,val,max,color,w){
  const p=Math.round(val/max*100);
  return `<div class="bar-row"><span class="bar-name" style="width:${w}px;color:${color}" title="${esc(name)}">${esc(name)}</span><div class="bar-track"><div class="bar-fill" style="background:${color}" data-p="${p}"></div></div><span class="bar-num">${val}</span></div>`;
}

function drawDonut(segs,total,pct){
  const cv=document.getElementById('donut'),cx=cv.getContext('2d');
  cx.clearRect(0,0,110,110);
  let a=-Math.PI/2;
  segs.forEach(s=>{const sl=s.v/total*2*Math.PI;cx.beginPath();cx.moveTo(55,55);cx.arc(55,55,50,a,a+sl);cx.closePath();cx.fillStyle=s.c;cx.fill();a+=sl;});
  cx.beginPath();cx.arc(55,55,30,0,2*Math.PI);cx.fillStyle='#14141c';cx.fill();
  cx.fillStyle='#e2e2f0';cx.font='bold 13px Syne,sans-serif';cx.textAlign='center';cx.fillText(pct+'%',55,60);
  document.getElementById('donut-leg').innerHTML=segs.map(s=>`<div class="leg-row"><div class="leg-dot" style="background:${s.c}"></div><span>${s.l}</span><span class="leg-val">${s.v}</span></div>`).join('');
}

// ═══════════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════════
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function setStatus(type, txt) {
  const el = document.getElementById('status-search');
  const tel = document.getElementById('status-search-txt');
  el.style.display = 'flex';
  el.className = 'status-bar ' + type;
  el.querySelector('.sdot').className = 'sdot' + (type==='loading'?' spin':'');
  tel.textContent = txt;
  if (type === 'ok') setTimeout(()=>{ el.style.display='none'; }, 3000);
}
function setSyncState(on) {
  const b = document.getElementById('sync-btn');
  b.textContent = on ? '⟳ Syncing…' : '↻ Sync';
  b.classList.toggle('spinning', on);
}
function p_(v,t){ return t ? Math.round(v/t*100) : 0; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escReg(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

// ═══════════════════════════════════════════════════════════
// INIT — load from cache first, then sync
// ═══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  // Try cache for instant display
  try {
    const cached = localStorage.getItem('tape_cache');
    if (cached) {
      const {ts, data} = JSON.parse(cached);
      const age = Date.now() - ts;
      if (data && data.length && age < 24*60*60*1000) {
        ALL_TAPES = data;
        renderDashboard();
        renderCollection();
        doSearch();
        buildFilters();
        setStatus('ok', `✓ ${ALL_TAPES.length} tapes (cached) — tap Sync to refresh`);
      }
    }
  } catch(e) {}

  // Always sync fresh on load
  await loadData();
});
</script>
