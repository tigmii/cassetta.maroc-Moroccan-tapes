<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>كاسيتا MAROC — Tape Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#050505;--s1:#0d0d0d;--s2:#141414;--s3:#1c1c1c;--bdr:#252525;
  --grn:#03a74e;--grn2:#02c45c;--grn3:rgba(3,167,78,.12);--grn4:rgba(3,167,78,.06);
  --txt:#f0f0f0;--mut:#555;--mut2:#777;
  --ff:'Syne',sans-serif;--fm:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--ff);min-height:100vh;overflow-x:hidden}

/* subtle dot grid */
body::after{content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle, #1a1a1a 1px, transparent 1px);
  background-size:28px 28px;opacity:.6;pointer-events:none;z-index:0}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:50;background:rgba(5,5,5,.95);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;gap:0;padding:0 20px;height:56px}
.nav-logo{display:flex;align-items:center;padding-right:16px;border-right:1px solid var(--bdr);margin-right:6px;flex-shrink:0}
.nav-logo img{height:32px;width:auto;filter:brightness(0) invert(1)}
.tab{padding:16px 16px;font-family:var(--fm);font-size:9px;letter-spacing:2px;
  text-transform:uppercase;color:var(--mut2);cursor:pointer;
  border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;
  flex-shrink:0;border-top:none;border-left:none;border-right:none;background:none}
.tab:hover{color:var(--txt)}
.tab.active{color:var(--grn);border-bottom:2px solid var(--grn)}
.sync-btn{margin-left:auto;flex-shrink:0;padding:6px 14px;
  background:var(--s3);border:1px solid var(--bdr);border-radius:6px;
  color:var(--mut2);font-family:var(--fm);font-size:9px;letter-spacing:1px;
  cursor:pointer;transition:all .2s;white-space:nowrap}
.sync-btn:hover{color:var(--txt);border-color:var(--grn)}
.sync-btn.spinning{color:var(--grn);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── PAGES ── */
.page{display:none;position:relative;z-index:1;max-width:860px;margin:0 auto;padding:20px 16px 100px}
.page.active{display:block}

/* ── STATUS ── */
.status-bar{font-family:var(--fm);font-size:10px;padding:8px 14px;border-radius:8px;
  margin-bottom:20px;display:flex;align-items:center;gap:8px}
.status-bar.ok{background:var(--grn3);color:var(--grn);border:1px solid rgba(3,167,78,.25)}
.status-bar.err{background:rgba(220,50,50,.08);color:#f87171;border:1px solid rgba(220,50,50,.2)}
.status-bar.loading{background:rgba(255,255,255,.04);color:var(--mut2);border:1px solid var(--bdr)}
.sdot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.sdot.spin{animation:pulse 1s infinite}

/* ── SEARCH HERO ── */
.search-hero{text-align:center;padding:32px 0 24px;position:relative}
.hero-logo{margin-bottom:20px}
.hero-logo img{height:90px;width:auto;filter:brightness(0) invert(1);
  drop-shadow:0 0 40px rgba(3,167,78,.3)}
.search-hero h1{font-size:clamp(18px,4vw,26px);font-weight:800;margin-bottom:4px;color:var(--txt)}
.search-hero h1 span{color:var(--grn)}
.search-hero p{font-family:var(--fm);font-size:10px;color:var(--mut2);letter-spacing:1px}

/* ── SEARCH BOX ── */
.search-box{position:relative;margin:20px 0 10px}
.search-box input{
  width:100%;padding:16px 52px 16px 20px;
  background:var(--s1);border:1.5px solid var(--bdr);
  border-radius:12px;color:var(--txt);
  font-family:var(--ff);font-size:16px;outline:none;
  transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;
}
.search-box input:focus{border-color:var(--grn);box-shadow:0 0 0 3px rgba(3,167,78,.1)}
.search-box input::placeholder{color:var(--mut)}
.search-icon{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:20px;pointer-events:none;opacity:.5}

/* ── FILTERS ── */
.search-filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.filter-btn{padding:6px 13px;border-radius:20px;border:1px solid var(--bdr);
  background:var(--s2);color:var(--mut2);font-family:var(--fm);font-size:9px;
  cursor:pointer;transition:all .2s;letter-spacing:.5px}
.filter-btn:hover{border-color:var(--grn);color:var(--grn)}
.filter-btn.active{background:var(--grn);color:#000;border-color:var(--grn);font-weight:700}
.search-count{font-family:var(--fm);font-size:10px;color:var(--mut2);margin-bottom:12px}
.search-count b{color:var(--grn)}

/* ── TAPE CARD ── */
.tape-card{
  background:var(--s1);border:1px solid var(--bdr);
  border-radius:10px;padding:14px 16px;margin-bottom:8px;
  display:flex;align-items:flex-start;gap:12px;
  transition:border-color .2s,transform .15s,background .2s;
}
.tape-card:hover{border-color:var(--grn);transform:translateX(4px);background:var(--s2)}
.tape-num{font-family:var(--fm);font-size:10px;color:var(--mut);flex-shrink:0;padding-top:2px;min-width:30px}
.tape-body{flex:1;min-width:0}
.tape-artist{font-size:14px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tape-album{font-size:12px;color:var(--mut2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:7px}
.tape-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:8px;font-family:var(--fm);font-size:8px;font-weight:700;letter-spacing:.5px}
.tag-genre{background:rgba(255,255,255,.06);color:var(--mut2)}
.tag-dig{background:var(--grn3);color:var(--grn);border:1px solid rgba(3,167,78,.2)}
.tag-nodig{background:rgba(255,255,255,.04);color:var(--mut)}
.tag-yt{background:rgba(255,50,50,.1);color:#ff4444}
.tag-ig{background:rgba(192,100,252,.1);color:#c084fc}
.tag-wa{background:rgba(30,200,220,.1);color:#22d3ee}
mark{background:rgba(3,167,78,.2);color:var(--grn);border-radius:2px;padding:0 1px}

.no-results{text-align:center;padding:60px 20px;color:var(--mut)}
.no-results .icon{font-size:44px;margin-bottom:12px;opacity:.2}
.no-results p{font-family:var(--fm);font-size:12px;line-height:1.8;color:var(--mut2)}

/* ── DASHBOARD ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(138px,1fr));gap:10px;margin-bottom:24px}
.kpi{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:16px 14px 12px;position:relative;overflow:hidden;transition:border-color .2s}
.kpi:hover{border-color:var(--kc,var(--grn))}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--kc,var(--grn))}
.kpi-lbl{font-family:var(--fm);font-size:8px;letter-spacing:2px;color:var(--mut);text-transform:uppercase;margin-bottom:6px}
.kpi-val{font-size:32px;font-weight:800;color:var(--kc,var(--grn));line-height:1}
.kpi-sub{font-size:10px;color:var(--mut2);margin-top:4px}
.sec-title{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--mut);margin:24px 0 12px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--bdr)}
.prog-card{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:22px;margin-bottom:16px}
.prog-big{font-size:60px;font-weight:800;color:var(--grn);line-height:1;margin-bottom:14px;text-shadow:0 0 40px rgba(3,167,78,.4)}
.prog-track{background:var(--bdr);border-radius:6px;height:8px;overflow:hidden;margin-bottom:14px}
.prog-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--grn),#00e676);width:0%;transition:width 1.4s cubic-bezier(.4,0,.2,1)}
.prog-meta{display:flex;gap:18px;flex-wrap:wrap}
.pm{display:flex;flex-direction:column;gap:1px}
.pm-v{font-size:20px;font-weight:800}
.pm-l{font-family:var(--fm);font-size:8px;color:var(--mut);letter-spacing:1px;text-transform:uppercase}
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:18px;margin-bottom:12px}
.card-title{font-family:var(--fm);font-size:8px;letter-spacing:2px;color:var(--mut);text-transform:uppercase;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.bar-name{font-size:11px;font-weight:600;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;background:var(--bdr);border-radius:4px;height:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;width:0%;transition:width 1s cubic-bezier(.4,0,.2,1)}
.bar-num{font-family:var(--fm);font-size:9px;color:var(--mut2);flex-shrink:0;width:26px;text-align:right}
.donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.donut-leg{flex:1;min-width:110px}
.leg-row{display:flex;align-items:center;gap:7px;margin-bottom:8px;font-size:11px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-val{font-family:var(--fm);font-size:9px;color:var(--mut2);margin-left:auto}
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:14px}
.spinner{width:40px;height:40px;border-radius:50%;border:2px solid var(--bdr);border-top-color:var(--grn);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader p{font-family:var(--fm);font-size:10px;color:var(--mut2)}
@media(max-width:600px){
  .nav{padding:0 12px}
  .tab{padding:14px 11px;font-size:8px}
  .page{padding:16px 12px 100px}
  .hero-logo img{height:70px}
  .grid2{grid-template-columns:1fr!important}
}
</style>
</head>

async function tryFetch(url,ms=7000){
  const ctrl=new AbortController(),t=setTimeout(()=>ctrl.abort(),ms);
  try{const r=await fetch(url,{signal:ctrl.signal});clearTimeout(t);if(!r.ok)return null;const tx=await r.text();return tx.length>30?tx:null;}
  catch(e){clearTimeout(t);return null;}
}

async function loadData(){
  setSpin(true);setStatus('loading','Syncing with Google Sheets…');
  let text=await tryFetch(SHEET_URL,5000);
  if(!text){for(const px of PROXIES){setStatus('loading','Connecting…');text=await tryFetch(px(SHEET_URL),8000);if(text)break;}}
  setSpin(false);
  if(!text){setStatus('err','❌ Could not connect. Check internet and tap Sync again.');return;}
  try{
    let rows=parseCSV(text);
    if(!Object.keys(rows[0]||{}).includes('Artist')){
      const lines=text.trim().split(/
?
/),hi=lines.findIndex(l=>/artist/i.test(l));
      if(hi>=0)rows=parseCSV(lines.slice(hi).join('\n'));
    }
    rows=rows.filter(r=>{const a=(r['Artist']||'').trim();return a&&!['Artist','Artiste'].includes(a);});
    if(!rows.length)throw new Error('No tape rows found');
    ALL_TAPES=rows.map((r,i)=>norm(r,i));
    renderDash();renderCol();doSearch();buildFilters();
    setStatus('ok',`✓ ${ALL_TAPES.length} tapes loaded`);
    try{localStorage.setItem('kassita_cache',JSON.stringify({ts:Date.now(),data:ALL_TAPES}));}catch(e){}
  }catch(e){setStatus('err','⚠ Parse error: '+e.message);}
}

function get(r,...keys){for(const k of keys)if(r[k]!==undefined&&r[k]!=='')return r[k];return '';}
function norm(r,i){
  return{
    ref:get(r,'REF','Ref')||(i+1),
    artist:get(r,'Artist','ARTIST'),
    album:get(r,'Album_Title','Album / Title','Album'),
    genre:get(r,'Genre_Category','Genre / Category','Genre'),
    label:get(r,'Label_Notes','Label / Notes','Label'),
    digitized:isYes(get(r,'Digitized','DIGITIZED')),
    cover:isYes(get(r,'COVER_SCAN','Cover Scan','COVER SCAN')),
    youtube:isPosted(get(r,'YOUTUBE','Youtube')),
    instagram:isPosted(get(r,'INSTAGRAM','Instagram')),
    webarchive:isPosted(get(r,'WEBARCHIVE','WebArchive')),
    mainGenre:mg(get(r,'Genre_Category','Genre / Category','Genre')),
  };
}

function doSearch(){
  const q=(document.getElementById('q').value||'').toLowerCase().trim();
  let res=ALL_TAPES;
  if(activeFilter==='digitized')res=res.filter(t=>t.digitized);
  if(activeFilter==='not_dig')res=res.filter(t=>!t.digitized);
  if(activeFilter==='published')res=res.filter(t=>t.youtube||t.instagram||t.webarchive);
  if(activeFilter==='not_started')res=res.filter(t=>!t.digitized&&!t.cover&&!t.youtube&&!t.instagram&&!t.webarchive);
  if(q)res=res.filter(t=>t.artist.toLowerCase().includes(q)||t.album.toLowerCase().includes(q)||t.genre.toLowerCase().includes(q)||t.label.toLowerCase().includes(q)||String(t.ref).includes(q));
  const cnt=document.getElementById('search-count');
  if(!ALL_TAPES.length){cnt.innerHTML='';document.getElementById('results').innerHTML='<div class="loader"><div class="spinner"></div><p>Loading collection…</p></div>';return;}
  cnt.innerHTML=(q||activeFilter!=='all')?`<b>${res.length}</b> result${res.length!==1?'s':''} found`:`<b>${ALL_TAPES.length}</b> tapes in collection`;
  if(!res.length){document.getElementById('results').innerHTML=`<div class="no-results"><div class="icon">📼</div><p>No tapes found for "<strong>${esc(q)}</strong>"<br>Try the artist name, album, or genre</p></div>`;return;}
  document.getElementById('results').innerHTML=res.slice(0,120).map(t=>card(t,q)).join('');
}

function card(t,q=''){
  const hi=s=>q?s.replace(new RegExp(`(${escR(q)})`,`gi`),'<mark>$1</mark>'):s;
  const tags=[
    t.digitized?`<span class="tag tag-dig">✓ Digitized</span>`:`<span class="tag tag-nodig">Not digitized</span>`,
    t.mainGenre?`<span class="tag tag-genre">${esc(t.mainGenre)}</span>`:'',
    t.youtube?`<span class="tag tag-yt">YT</span>`:'',
    t.instagram?`<span class="tag tag-ig">IG</span>`:'',
    t.webarchive?`<span class="tag tag-wa">Archive</span>`:'',
  ].filter(Boolean).join('');
  return`<div class="tape-card"><div class="tape-num">#${t.ref}</div><div class="tape-body"><div class="tape-artist">${hi(esc(t.artist))}</div><div class="tape-album">${hi(esc(t.album||'—'))}</div><div class="tape-tags">${tags}</div></div></div>`;
}

function buildFilters(){
  const btns=[{k:'all',l:'All'},{k:'digitized',l:'✓ Digitized'},{k:'not_dig',l:'Not Digitized'},{k:'published',l:'Published'},{k:'not_started',l:'Not Started'}];
  const genres=[...new Set(ALL_TAPES.map(t=>t.mainGenre).filter(Boolean))].sort().slice(0,6);
  document.getElementById('filters').innerHTML=
    btns.map(b=>`<button class="filter-btn ${activeFilter===b.k?'active':''}" onclick="setFilter('${b.k}')">${b.l}</button>`).join('')+
    genres.map(g=>`<button class="filter-btn" onclick="setGF('${esc(g)}')">${esc(g)}</button>`).join('');
}
function setFilter(k){activeFilter=k;buildFilters();doSearch();}
function setGF(g){document.getElementById('q').value=g;activeFilter='all';buildFilters();doSearch();}

function renderCol(){
  document.getElementById('col-count').textContent=ALL_TAPES.length+' tapes';
  document.getElementById('col-list').innerHTML=ALL_TAPES.map(t=>card(t)).join('');
}

function renderDash(){
  const T=ALL_TAPES,total=T.length;
  const dig=T.filter(t=>t.digitized).length,cov=T.filter(t=>t.cover).length;
  const yt=T.filter(t=>t.youtube).length,ig=T.filter(t=>t.instagram).length,wa=T.filter(t=>t.webarchive).length;
  const ns=T.filter(t=>!t.digitized&&!t.cover&&!t.youtube&&!t.instagram&&!t.webarchive).length;
  const pct=total?Math.round(dig/total*100):0;
  document.getElementById('kpi-grid').innerHTML=[
    {l:'Total Tapes',v:total,s:'in collection',c:'var(--grn)'},
    {l:'Digitized',v:dig,s:`${pct}% complete`,c:'var(--grn)'},
    {l:'Cover Scanned',v:cov,s:`${p_(cov,total)}% of total`,c:'#02c45c'},
    {l:'Not Started',v:ns,s:`${p_(ns,total)}% remain`,c:'#666'},
    {l:'YouTube',v:yt,s:'published',c:'#ff4444'},
    {l:'Instagram',v:ig,s:'published',c:'#c084fc'},
    {l:'WebArchive',v:wa,s:'archived',c:'#22d3ee'},
    {l:'Published',v:yt+ig+wa,s:'across platforms',c:'#02c45c'},
  ].map(k=>`<div class="kpi" style="--kc:${k.c}"><div class="kpi-lbl">${k.l}</div><div class="kpi-val">${k.v}</div><div class="kpi-sub">${k.s}</div></div>`).join('');
  document.getElementById('pct-big').textContent=pct+'%';
  setTimeout(()=>{document.getElementById('prog-fill').style.width=pct+'%';},150);
  document.getElementById('prog-meta').innerHTML=[
    {v:dig,l:'Digitized',c:'var(--grn)'},{v:cov,l:'Cover Scan',c:'#02c45c'},
    {v:ns,l:'Not Started',c:'#555'},{v:yt+ig+wa,l:'Published',c:'#c084fc'},
  ].map(s=>`<div class="pm"><span class="pm-v" style="color:${s.c}">${s.v}</span><span class="pm-l">${s.l}</span></div>`).join('');
  const segs=[{l:'Digitized',v:dig,c:'#03a74e'},{l:'Cover Only',v:Math.max(0,cov-dig),c:'#02c45c'},{l:'In Progress',v:Math.max(0,total-dig-ns),c:'#555'},{l:'Not Started',v:ns,c:'#333'}].filter(s=>s.v>0);
  drawDonut(segs,total,pct);
  document.getElementById('plat-bars').innerHTML=[{n:'YouTube',v:yt,c:'#ff4444'},{n:'Instagram',v:ig,c:'#c084fc'},{n:'WebArchive',v:wa,c:'#22d3ee'}].map(p=>bRow(p.n,p.v,total,p.c,80)).join('');
  const gmap={};T.forEach(t=>{const g=t.mainGenre||'Unknown';gmap[g]=(gmap[g]||0)+1;});
  const genres=Object.entries(gmap).sort((a,b)=>b[1]-a[1]).slice(0,12);
  const gmax=genres[0]?.[1]||1;
  document.getElementById('genre-bars').innerHTML=genres.map(([g,c],i)=>bRow(g,c,gmax,COLS[i%COLS.length],100)).join('');
  const lmap={};T.forEach(t=>{const l=(t.label||'').trim();if(l&&l!=='undefined')lmap[l]=(lmap[l]||0)+1;});
  const labels=Object.entries(lmap).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const lmax=labels[0]?.[1]||1;
  document.getElementById('label-bars').innerHTML=labels.map(([l,c],i)=>bRow(l,c,lmax,COLS[i%COLS.length],110)).join('');
  setTimeout(()=>{document.querySelectorAll('.bar-fill').forEach(b=>{b.style.width=b.dataset.p+'%';});},200);
}

function bRow(name,val,max,color,w){
  const p=Math.round(val/max*100);
  return`<div class="bar-row"><span class="bar-name" style="width:${w}px;color:${color}" title="${esc(name)}">${esc(name)}</span><div class="bar-track"><div class="bar-fill" style="background:${color}" data-p="${p}"></div></div><span class="bar-num">${val}</span></div>`;
}
function drawDonut(segs,total,pct){
  const cv=document.getElementById('donut'),cx=cv.getContext('2d');
  cx.clearRect(0,0,110,110);let a=-Math.PI/2;
  segs.forEach(s=>{const sl=s.v/total*2*Math.PI;cx.beginPath();cx.moveTo(55,55);cx.arc(55,55,50,a,a+sl);cx.closePath();cx.fillStyle=s.c;cx.fill();a+=sl;});
  cx.beginPath();cx.arc(55,55,30,0,2*Math.PI);cx.fillStyle='#0d0d0d';cx.fill();
  cx.fillStyle='#f0f0f0';cx.font='bold 13px Syne,sans-serif';cx.textAlign='center';cx.fillText(pct+'%',55,60);
  document.getElementById('donut-leg').innerHTML=segs.map(s=>`<div class="leg-row"><div class="leg-dot" style="background:${s.c}"></div><span>${s.l}</span><span class="leg-val">${s.v}</span></div>`).join('');
}

function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
}
function setStatus(type,txt){
  const el=document.getElementById('status-search'),tel=document.getElementById('status-search-txt');
  el.style.display='flex';el.className='status-bar '+type;
  el.querySelector('.sdot').className='sdot'+(type==='loading'?' spin':'');
  tel.textContent=txt;
  if(type==='ok')setTimeout(()=>{el.style.display='none';},3000);
}
function setSpin(on){const b=document.getElementById('sync-btn');b.textContent=on?'⟳ Syncing…':'↻ Sync';b.classList.toggle('spinning',on);}
function p_(v,t){return t?Math.round(v/t*100):0;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escR(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

window.addEventListener('DOMContentLoaded',async()=>{
  try{
    const c=localStorage.getItem('kassita_cache');
    if(c){const {ts,data}=JSON.parse(c);if(data&&data.length&&Date.now()-ts<86400000){ALL_TAPES=data;renderDash();renderCol();doSearch();buildFilters();setStatus('ok',`✓ ${ALL_TAPES.length} tapes (cached)`);}}
  }catch(e){}
  await loadData();
});
</script>
